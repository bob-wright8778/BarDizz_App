org.gradle.jvmargs=-Xmx4G
# Kotlin's incremental compiler can't relativize paths across drive letters (project on G:,
# Gradle/pub caches on C:) — throws "this and base files have different roots". Disabling
# incremental compilation avoids that path computation entirely.
kotlin.incremental=false
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
